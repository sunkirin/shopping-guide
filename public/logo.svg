<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4081"/>
      <stop offset="50%" style="stop-color:#FF6D3A"/>
      <stop offset="100%" style="stop-color:#FFB300"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#FF4081" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#FFD600" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Sparkles -->
  <g fill="#FFD600" transform="translate(8, 8)">
    <path d="M4,0 L4.8,3.2 L8,4 L4.8,4.8 L4,8 L3.2,4.8 L0,4 L3.2,3.2 Z" transform="scale(1.3)"/>
  </g>
  <g fill="#FF4081" transform="translate(105, 10)">
    <path d="M4,0 L4.8,3.2 L8,4 L4.8,4.8 L4,8 L3.2,4.8 L0,4 L3.2,3.2 Z" transform="scale(1)"/>
  </g>
  <g fill="#FFD600" transform="translate(112, 100)">
    <path d="M4,0 L4.8,3.2 L8,4 L4.8,4.8 L4,8 L3.2,4.8 L0,4 L3.2,3.2 Z" transform="scale(0.9)"/>
  </g>
  <g fill="#FF6D3A" transform="translate(12, 105)">
    <path d="M4,0 L4.8,3.2 L8,4 L4.8,4.8 L4,8 L3.2,4.8 L0,4 L3.2,3.2 Z" transform="scale(1.1)"/>
  </g>

  <!-- Main bubble -->
  <circle cx="70" cy="70" r="58" fill="url(#grad)" filter="url(#shadow)"/>

  <!-- Inner ring -->
  <circle cx="70" cy="70" r="48" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-dasharray="8 4"/>

  <!-- 折 character -->
  <text x="70" y="80" text-anchor="middle" font-size="50" font-weight="900"
        fill="white" font-family="PingFang SC, Microsoft YaHei, sans-serif"
        filter="url(#glow)">折</text>

  <!-- Top highlight -->
  <ellipse cx="52" cy="45" rx="18" ry="10" fill="rgba(255,255,255,0.25)" transform="rotate(-30 52 45)"/>
</svg>
